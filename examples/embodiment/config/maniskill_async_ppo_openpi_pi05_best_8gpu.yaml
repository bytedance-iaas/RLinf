# Best-known ASYNC + COLLOCATED Pi0.5 PPO config for ManiSkill (25-main) on 8xH20.
#
# ManiSkill uses SAPIEN GPU simulation, so env work competes with actor and
# rollout when all components are collocated. Profile tail latency before
# applying this 8-GPU placement to a different task or GPU architecture.
# Tuning baked in from the profiling sweep:
#   - envs=320, micro_batch=32, global_batch=5120 -> per-GPU flat/rank=640,
#     gradient_accum=20; keeps GPUs busy through the actor update.
#   - rollout torch.compile ON (mode "default"): trims denoise elementwise/launch
#     overhead; GEMM unaffected. actor-side compile OFF (FSDP1 incompatibility).
#   - sync_weight_no_wait ON: overlaps actor->rollout weight sync when
#     AsyncPPOEmbodiedRunner background-sync support is available. Older runners
#     remain correct but block during synchronization.
#
# Launch via train_async.py (run_async.sh) with ROBOT_PLATFORM=BRIDGE.
defaults:
  - env/maniskill_put_on_plate_in_scene_25_main@env.train
  - env/maniskill_put_on_plate_in_scene_25_main@env.eval
  - model/pi0_5@actor.model
  - hybrid_engines/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - _self_
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-7      # COLLOCATED on 8 GPUs

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "maniskill_async_best_8gpu"
    logger_backends: ["tensorboard"]
  max_epochs: 1000
  max_steps: -1
  only_eval: False
  val_check_interval: -1
  save_interval: 40
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  staleness_threshold: 1
  behave_weight_threshold: 2

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level
  update_epoch: 2

  adv_type: gae
  loss_type: decoupled_actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0.005
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.0
  rewards_upper_bound: 1.0

env:
  group_name: "EnvGroup"
  enable_offload: False
  train:
    rollout_epoch: 1
    total_num_envs: 320           # 320 // 8 gpus = 40/gpu; flat/rank=640
    auto_reset: True
    use_fixed_reset_state_ids: False
    max_episode_steps: 80
    max_steps_per_rollout_epoch: 80   # divisible by num_action_chunks(5)
    init_params:
      use_multiple_plates: False
  eval:
    rollout_epoch: 1
    total_num_envs: 320
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 80
    max_steps_per_rollout_epoch: 80
    use_fixed_reset_state_ids: True
    group_size: ${algorithm.group_size}
    is_eval: True
    video_cfg:
      save_video: False
    init_params:
      use_multiple_plates: False

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1
  enable_torch_compile: True
  torch_compile_mode: "default"
  model:
    model_path: "/path/to/model/RLinf-Pi05-ManiSkill-25Main-SFT" # https://huggingface.co/RLinf/RLinf-Pi05-ManiSkill-25Main-SFT
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  sync_weight_no_wait: True       # requires AsyncPPOEmbodiedRunner background-sync support
  micro_batch_size: 32
  global_batch_size: 5120         # micro(32) * world_size(8) * grad_accum(20); 640 % (5120/8=640)==0
  seed: 0
  enable_offload: False
  model:
    model_path: "/path/to/model/RLinf-Pi05-ManiSkill-25Main-SFT" # https://huggingface.co/RLinf/RLinf-Pi05-ManiSkill-25Main-SFT
    model_type: "openpi"
    add_value_head: True
    num_action_chunks: 5
    num_steps: 4
    openpi:
      value_after_vlm: True
      config_name: "pi05_maniskill"
      num_images_in_input: 1
      noise_method: "flow_noise"
      action_horizon: 8
      noise_params: [0.16, 0.12, 200]
      joint_logprob: True
    policy_setup: widowx_bridge
  optim:
    lr: 7.91e-6
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    clip_grad: 1.0
    critic_warmup_steps: 0
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
