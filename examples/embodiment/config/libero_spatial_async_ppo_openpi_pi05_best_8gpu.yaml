# Best-known ASYNC + COLLOCATED Pi0.5 PPO config for LIBERO-spatial on 8xH20.
#
# Derived from the profiling sweep (prof1-5). Key tuning results baked in:
#   - envs=128, micro_batch=32 -> per-GPU flat/rank=384, gradient_accum=1;
#     saturates GPU compute (p50 util ~97%) at ~49-55GB/card (no_shard leaves
#     headroom; the ~40GB floor is the resident full model + optim state).
#   - rollout torch.compile ON: shaves the ~12.5% elementwise/launch overhead
#     in the denoise path (GEMM ~60% is unaffected). mode "default".
#   - actor-side torch.compile is intentionally OFF: incompatible with the FSDP1
#     FlatParameter writeback path (needs FSDP2/DTensor first).
#   - sync_weight_no_wait ON: overlaps actor->rollout weight sync when
#     AsyncPPOEmbodiedRunner background-sync support is available. Older runners
#     remain correct but block during synchronization.
#
# Launch via train_async.py (run_async.sh).
defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/pi0_5@actor.model
  - hybrid_engines/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - _self_
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all      # COLLOCATED: all 3 share the 8 GPUs

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "pi05_async_best_8gpu"
    logger_backends: ["tensorboard"]
  max_epochs: 1000
  max_steps: -1
  only_eval: False
  val_check_interval: -1
  save_interval: 40
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 2
  reward_coef: 1.0
  staleness_threshold: 1
  behave_weight_threshold: 2.0

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 2

  adv_type: gae
  loss_type: decoupled_actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95
  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

env:
  group_name: "EnvGroup"
  enable_offload: False
  train:
    rollout_epoch: 1
    total_num_envs: 128           # 128 // 8 gpus = 16/gpu, divisible by group_size 2; flat/rank=384
    group_size: ${algorithm.group_size}
    max_episode_steps: 120
    max_steps_per_rollout_epoch: 120  # divisible by num_action_chunks(5)
  eval:
    rollout_epoch: 1
    total_num_envs: 64
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 120
    max_steps_per_rollout_epoch: 120
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: False

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1
  enable_torch_compile: True
  torch_compile_mode: "default"
  model:
    model_path: "/path/to/model/RLinf-Pi05-LIBERO-SFT" # https://huggingface.co/RLinf/RLinf-Pi05-LIBERO-SFT
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  sync_weight_no_wait: True       # requires AsyncPPOEmbodiedRunner background-sync support
  micro_batch_size: 32
  global_batch_size: 256          # micro(32) * world_size(8), gradient_accum=1; 384 % (256/8=32)==0
  seed: 42
  enable_offload: False
  model:
    model_path: "/path/to/model/RLinf-Pi05-LIBERO-SFT" # https://huggingface.co/RLinf/RLinf-Pi05-LIBERO-SFT
    model_type: "openpi"
    num_action_chunks: 5
    num_steps: 3
    add_value_head: True
    openpi:
      value_after_vlm: True
  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
